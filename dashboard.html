<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperatur Dashboard mit Diagramm</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1400px; margin: auto; }
        h1 { color: #2c3e50; }
        .controls { margin: 20px 0; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        select, button { padding: 8px 12px; font-size: 1rem; }
        .chart-container { background: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        canvas { max-height: 400px; width: 100%; }
        table { border-collapse: collapse; width: 100%; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .last-update { margin-bottom: 10px; font-style: italic; }
        .table-container { overflow-x: auto; }
        .sensor-select { font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>📈 Temperaturlogger Dashboard</h1>
    <div class="controls">
        <label>Sensor auswählen:</label>
        <select id="sensorSelect">
            <option value="">-- Bitte Sensor wählen --</option>
        </select>
        <label>Zeitraum:</label>
        <select id="hoursSelect">
            <option value="6">Letzte 6 Stunden</option>
            <option value="12">Letzte 12 Stunden</option>
            <option value="24" selected>Letzte 24 Stunden</option>
            <option value="48">Letzte 48 Stunden</option>
            <option value="168">Letzte 7 Tage</option>
        </select>
        <button id="refreshBtn">Aktualisieren</button>
    </div>
    <div class="chart-container">
        <canvas id="tempChart"></canvas>
    </div>
    <div class="last-update" id="lastUpdate"></div>
    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr><th>Zeit</th><th>Sensor</th><th>Temperatur (°C)</th><th>RSSI (dBm)</th><th>ID</th></tr>
            </thead>
            <tbody id="tableBody"><tr><td colspan="5">Daten werden geladen...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    let chartInstance = null;
    let allData = [];     // alle Rohdaten (für die Tabelle)
    let sensors = new Map(); // Map<ident_nummer, name>

    async function fetchData(hours) {
        try {
            const url = `/temperaturlogger/api-ausgabe.php?hours=${hours}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error('Netzwerkfehler');
            const data = await response.json();
            allData = data;
            // Sensorenliste aktualisieren
            updateSensorList(data);
            // Tabelle neu zeichnen (alle Daten, sortiert absteigend)
            displayTable(data);
            // Diagramm aktualisieren (falls ein Sensor ausgewählt ist)
            const selectedId = document.getElementById('sensorSelect').value;
            if (selectedId) {
                updateChart(selectedId, data);
            } else {
                if (chartInstance) chartInstance.destroy();
                document.getElementById('tempChart').getContext('2d').clearRect(0,0,400,200);
            }
            document.getElementById('lastUpdate').innerText = 'Letzte Aktualisierung: ' + new Date().toLocaleString();
        } catch (error) {
            console.error('Fehler:', error);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="5">Fehler beim Laden</td></tr>';
        }
    }

    function updateSensorList(data) {
        const select = document.getElementById('sensorSelect');
        const currentValue = select.value;
        // Map füllen
        data.forEach(row => {
            const id = row.ident_nummer;
            if (!sensors.has(id)) {
                sensors.set(id, row.name);
            }
        });
        // Dropdown neu aufbauen (ohne Event-Listener kurzzeitig)
        const oldListener = select.onchange;
        select.onchange = null;
        select.innerHTML = '<option value="">-- Bitte Sensor wählen --</option>';
        for (let [id, name] of sensors.entries()) {
            const option = document.createElement('option');
            option.value = id;
            option.textContent = `${name} (ID ${id})`;
            select.appendChild(option);
        }
        if (currentValue && sensors.has(currentValue)) select.value = currentValue;
        select.onchange = oldListener;
    }

    function displayTable(data) {
        const tbody = document.getElementById('tableBody');
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="5">Keine Daten im Zeitraum</td></tr>';
            return;
        }
        // Sortieren: neueste zuerst
        const sorted = [...data].sort((a,b) => new Date(b.zeit) - new Date(a.zeit));
        const rows = sorted.map(row => `
            <tr>
                <td>${new Date(row.zeit).toLocaleString()}</td>
                <td>${escapeHtml(row.name)} (${row.ident_nummer})</td>
                <td>${parseFloat(row.wert).toFixed(2)} °C</td>
                <td>${row.rssi_value} dBm</td>
                <td>${row.id}</td>
            </tr>
        `).join('');
        tbody.innerHTML = rows;
    }

    function updateChart(sensorId, data) {
        // Daten für diesen Sensor filtern und nach Zeit aufsteigend sortieren
        const sensorData = data
            .filter(row => row.ident_nummer == sensorId)
            .sort((a,b) => new Date(a.zeit) - new Date(b.zeit));
        
        if (sensorData.length === 0) {
            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('tempChart').getContext('2d');
            ctx.clearRect(0,0,400,200);
            ctx.font = '16px Arial';
            ctx.fillStyle = 'gray';
            ctx.fillText('Keine Daten für diesen Sensor im gewählten Zeitraum', 20, 50);
            return;
        }

        const labels = sensorData.map(row => new Date(row.zeit).toLocaleString());
        const temperatures = sensorData.map(row => parseFloat(row.wert));

        const ctx = document.getElementById('tempChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: `Temperatur – ${sensors.get(sensorId)} (ID ${sensorId})`,
                    data: temperatures,
                    borderColor: 'rgb(75, 192, 192)',
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    tension: 0.1,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    y: {
                        title: { display: true, text: 'Temperatur (°C)' },
                        beginAtZero: false
                    },
                    x: {
                        title: { display: true, text: 'Zeit' },
                        ticks: { maxRotation: 45, autoSkip: true }
                    }
                },
                plugins: {
                    tooltip: { mode: 'index', intersect: false },
                    zoom: false // optional
                }
            }
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event Listener
    document.getElementById('refreshBtn').addEventListener('click', () => {
        const hours = document.getElementById('hoursSelect').value;
        fetchData(hours);
    });
    document.getElementById('sensorSelect').addEventListener('change', (e) => {
        if (e.target.value && allData.length) {
            updateChart(e.target.value, allData);
        } else {
            if (chartInstance) chartInstance.destroy();
        }
    });

    // Initialer Aufruf (Standard: 24 Stunden)
    fetchData(24);
</script>
</body>
</html>
